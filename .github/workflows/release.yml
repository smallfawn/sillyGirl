name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v1.2.3. Defaults to the current ref name."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version
        id: vars
        shell: bash
        run: |
          input_version="$(jq -r '.inputs.version // ""' "${GITHUB_EVENT_PATH}")"
          if [[ -n "${input_version}" ]]; then
            version="${input_version}"
            publish_release="true"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            publish_release="true"
          else
            version="dev-${GITHUB_SHA::7}"
            publish_release="false"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "publish_release=${publish_release}" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.5"

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
          npm run build

      - name: Build binaries
        shell: bash
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist build
          ldflags="-s -w -X github.com/smallfawn/sillyGirl/core.compiled_at=${VERSION}"

          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            name="sillyGirl_${VERSION}_${goos}_${goarch}"
            binary="${name}"
            if [[ "${goos}" == "windows" ]]; then
              binary="${name}.exe"
            fi

            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 go build \
              -trimpath \
              -ldflags="${ldflags}" \
              -o "build/${binary}" .

            if [[ "${goos}" == "windows" ]]; then
              (cd build && zip "../dist/${name}.zip" "${binary}")
            else
              tar -czf "dist/${name}.tar.gz" -C build "${binary}"
            fi
          done

          sha256sum dist/* > dist/checksums.txt

      - name: Publish GitHub Release
        if: steps.vars.outputs.publish_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: SillyGirl ${{ steps.vars.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: dist/*

      - name: Upload build artifacts
        if: steps.vars.outputs.publish_release != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: sillyGirl-${{ steps.vars.outputs.version }}
          path: dist/*

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve image metadata
        id: vars
        shell: bash
        run: |
          input_version="$(jq -r '.inputs.version // ""' "${GITHUB_EVENT_PATH}")"
          if [[ -n "${input_version}" ]]; then
            version="${input_version}"
            publish_latest="true"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            publish_latest="true"
          else
            version="dev-${GITHUB_SHA::7}"
            publish_latest="false"
          fi
          dockerhub_image="docker.io/smallfawn/sillygirl"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "dockerhub_image=${dockerhub_image}" >> "${GITHUB_OUTPUT}"
          {
            echo "docker_tags<<EOF"
            echo "${dockerhub_image}:${version}"
            if [[ "${publish_latest}" == "true" ]]; then
              echo "${dockerhub_image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
          cache-from: type=gha,scope=sillygirl-docker
          cache-to: type=gha,mode=max,scope=sillygirl-docker
          tags: ${{ steps.vars.outputs.docker_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
